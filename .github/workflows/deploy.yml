name: Deploy Maison Stella

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-check:
    name: Validate Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write stub .env for build validation
        run: |
          cat > .env << 'EOF'
          MYSQL_ROOT_PASSWORD=ci_test
          MYSQL_DATABASE=maison_stella
          MYSQL_USER=stella_user
          MYSQL_PASSWORD=ci_test
          SESSION_SECRET=ci_secret
          PAYPAL_CLIENT_ID=ci_test
          PAYPAL_SECRET=ci_test
          PAYPAL_ENV=sandbox
          FEDAPAY_SECRET_KEY=ci_test
          FEDAPAY_ENV=sandbox
          EOF

      - name: Build Docker image
        run: docker compose build --no-cache

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write production .env
        run: printf '%s' "${{ secrets.ENV_FILE }}" > .env

      - name: Install rsync
        run: sudo apt-get install -y rsync

      - name: Write SSH private key
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directory
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: mkdir -p /opt/maison-stella

      - name: Sync files to server
        env:
          SERVER_USER: ${{ secrets.DEPLOY_USER }}
          SERVER_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='data' \
            --exclude='public/image' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            . "$SERVER_USER@$SERVER_HOST:/opt/maison-stella/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
            fi

            cd /opt/maison-stella

            docker compose down --remove-orphans || true
            docker compose up --build -d

            docker compose ps
