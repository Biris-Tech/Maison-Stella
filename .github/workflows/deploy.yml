name: Deploy Maison Stella

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/maison-stella

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy on server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest

            docker network create stella-net 2>/dev/null || true

            docker stop maison-stella-db maison-stella-app 2>/dev/null || true
            docker rm maison-stella-db maison-stella-app 2>/dev/null || true

            docker run -d \
              --name maison-stella-db \
              --network stella-net \
              --restart always \
              -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
              -e MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }} \
              -e MYSQL_USER=${{ secrets.MYSQL_USER }} \
              -e MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }} \
              -p 8007:3306 \
              -v stella_db:/var/lib/mysql \
              mysql:8.0

            sleep 20

            docker run -d \
              --name maison-stella-app \
              --network stella-net \
              --restart always \
              -e DATABASE_URL=mysql://${{ secrets.MYSQL_USER }}:${{ secrets.MYSQL_PASSWORD }}@maison-stella-db:3306/${{ secrets.MYSQL_DATABASE }} \
              -e BASE_URL=http://${{ secrets.DEPLOY_HOST }}:8006 \
              -e SESSION_SECRET=${{ secrets.SESSION_SECRET }} \
              -e PAYPAL_CLIENT_ID=${{ secrets.PAYPAL_CLIENT_ID }} \
              -e PAYPAL_SECRET=${{ secrets.PAYPAL_SECRET }} \
              -e PAYPAL_ENV=${{ secrets.PAYPAL_ENV }} \
              -e FEDAPAY_SECRET_KEY=${{ secrets.FEDAPAY_SECRET_KEY }} \
              -e FEDAPAY_ENV=${{ secrets.FEDAPAY_ENV }} \
              -p 8006:3000 \
              ghcr.io/${{ env.IMAGE_NAME }}:latest
